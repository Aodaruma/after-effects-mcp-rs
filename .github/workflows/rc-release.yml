name: RC Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify-tag-source:
    runs-on: ubuntu-latest
    outputs:
      on_main: ${{ steps.check.outputs.on_main }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify tag commit is on main
        id: check
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            echo "on_main=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git fetch origin main
          if git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"; then
            echo "on_main=true" >> "$GITHUB_OUTPUT"
          else
            echo "on_main=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Tag ${GITHUB_REF_NAME} is not based on origin/main. Release steps will be skipped."
          fi

  windows-rc:
    needs: verify-tag-source
    if: ${{ needs.verify-tag-source.outputs.on_main == 'true' }}
    runs-on: windows-latest
    env:
      WIN_SIGN_PFX_BASE64: ${{ secrets.WIN_SIGN_PFX_BASE64 }}
      WIN_SIGN_PFX_PASSWORD: ${{ secrets.WIN_SIGN_PFX_PASSWORD }}
      WIN_SIGN_TIMESTAMP_URL: ${{ secrets.WIN_SIGN_TIMESTAMP_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Install WiX CLI
        shell: pwsh
        run: |
          dotnet tool install --global wix --version 5.*
          "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build Windows installer artifacts
        shell: pwsh
        run: |
          .\scripts\package-windows.ps1 -OutputDir .\dist\windows -RequireMsi

      - name: Decode signing certificate
        if: ${{ env.WIN_SIGN_PFX_BASE64 != '' }}
        shell: pwsh
        run: |
          $bytes = [Convert]::FromBase64String("$env:WIN_SIGN_PFX_BASE64")
          $path = Join-Path $env:RUNNER_TEMP "codesign.pfx"
          [IO.File]::WriteAllBytes($path, $bytes)
          "WIN_SIGN_PFX_PATH=$path" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Sign Windows artifacts
        if: ${{ env.WIN_SIGN_PFX_BASE64 != '' && env.WIN_SIGN_PFX_PASSWORD != '' }}
        shell: pwsh
        run: |
          $timestamp = if ($env:WIN_SIGN_TIMESTAMP_URL) { $env:WIN_SIGN_TIMESTAMP_URL } else { "http://timestamp.digicert.com" }
          .\scripts\sign-windows.ps1 -ArtifactDir .\dist\windows -PfxPath $env:WIN_SIGN_PFX_PATH -PfxPassword $env:WIN_SIGN_PFX_PASSWORD -TimestampUrl $timestamp

      - name: Warn when Windows signing is skipped
        if: ${{ env.WIN_SIGN_PFX_BASE64 == '' || env.WIN_SIGN_PFX_PASSWORD == '' }}
        shell: pwsh
        run: |
          Write-Warning "Windows signing skipped. Set WIN_SIGN_PFX_BASE64 and WIN_SIGN_PFX_PASSWORD secrets."

      - name: Upload Windows RC artifacts
        uses: actions/upload-artifact@v7
        with:
          name: windows-rc-artifacts
          path: dist/windows/*

  macos-rc:
    needs: verify-tag-source
    if: ${{ needs.verify-tag-source.outputs.on_main == 'true' }}
    runs-on: macos-14
    env:
      MAC_CERT_P12_BASE64: ${{ secrets.MAC_CERT_P12_BASE64 }}
      MAC_CERT_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
      MAC_KEYCHAIN_PASSWORD: ${{ secrets.MAC_KEYCHAIN_PASSWORD }}
      MAC_CODESIGN_IDENTITY: ${{ secrets.MAC_CODESIGN_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build macOS installer artifacts
        run: |
          chmod +x ./scripts/package-macos.sh ./scripts/notarize-macos.sh
          REQUIRE_PKG=true ./scripts/package-macos.sh ./dist/macos

      - name: Import Apple certificate
        if: ${{ env.MAC_CERT_P12_BASE64 != '' && env.MAC_CERT_PASSWORD != '' }}
        run: |
          KEYCHAIN_PASS="${MAC_KEYCHAIN_PASSWORD:-temp-pass}"
          CERT_PATH="$RUNNER_TEMP/macos-cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          echo "$MAC_CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$MAC_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"

      - name: Notarize macOS artifacts
        if: ${{ env.MAC_CODESIGN_IDENTITY != '' && env.APPLE_ID != '' && env.APPLE_TEAM_ID != '' && env.APPLE_APP_SPECIFIC_PASSWORD != '' }}
        run: |
          ./scripts/notarize-macos.sh ./dist/macos

      - name: Warn when macOS notarization is skipped
        if: ${{ env.MAC_CODESIGN_IDENTITY == '' || env.APPLE_ID == '' || env.APPLE_TEAM_ID == '' || env.APPLE_APP_SPECIFIC_PASSWORD == '' }}
        run: |
          echo "::warning::macOS notarization skipped. Set MAC_CODESIGN_IDENTITY, APPLE_ID, APPLE_TEAM_ID, APPLE_APP_SPECIFIC_PASSWORD."

      - name: Upload macOS RC artifacts
        uses: actions/upload-artifact@v7
        with:
          name: macos-rc-artifacts
          path: dist/macos/*

  create-release:
    needs:
      - verify-tag-source
      - windows-rc
      - macos-rc
    if: ${{ needs.verify-tag-source.outputs.on_main == 'true' && startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v8
        with:
          name: windows-rc-artifacts
          path: dist/release/windows

      - name: Download macOS artifacts
        uses: actions/download-artifact@v8
        with:
          name: macos-rc-artifacts
          path: dist/release/macos

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          repo="${GITHUB_REPOSITORY}"

          # Collect only distributable artifacts (exclude intermediate files like stage/pkgroot).
          mapfile -t files < <(
            find dist/release/windows dist/release/macos -maxdepth 1 -type f \
              \( -name "*.zip" -o -name "*.msi" -o -name "*.pkg" -o -name "*.tar.gz" -o -name "*.dmg" \) \
              | sort
          )
          if [[ "${#files[@]}" -eq 0 ]]; then
            echo "No release artifacts were found."
            exit 1
          fi

          printf "Release assets:\n"
          printf "  - %s\n" "${files[@]}"

          if ! gh release view "$tag" --repo "$repo" >/dev/null 2>&1; then
            create_args=(release create "$tag" --repo "$repo" --title "$tag" --generate-notes)
            if [[ "$tag" == *"-rc"* ]]; then
              create_args+=(--prerelease)
            fi
            gh "${create_args[@]}"
          fi

          gh release upload "$tag" "${files[@]}" --clobber --repo "$repo"
